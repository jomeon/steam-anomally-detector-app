version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: steam_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: steam_redis
    restart: always
    ports:
      - "6379:6379"
  worker:
    build: ./backend
    container_name: steam_worker
    command: celery -A app.core.celery_app worker --beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always
    
volumes:
  postgres_data: